<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงเวลาทำงาน | InternPro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- ปรับ navbar ให้รองรับมือถือ (override บางส่วนของ style.css) -->
    <style>
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }
        .nav-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            margin: 4px 0;
            background: #1e293b;
            border-radius: 999px;
        }

        @media (max-width: 768px) {
            nav .nav-flex {
                justify-content: space-between;
            }
            nav ul {
                display: none;
                position: absolute;
                top: 60px;
                right: 20px;
                left: 20px;
                background: white;
                border-radius: 16px;
                box-shadow: 0 10px 25px -5px rgba(0,0,0,0.15);
                flex-direction: column;
                padding: 10px 0;
                z-index: 1000;
            }
            nav ul.open {
                display: flex;
            }
            .nav-toggle {
                display: block;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-flex">
            <a href="index.html" class="logo">INTERN<span>PRO</span></a>

            <button class="nav-toggle" aria-label="Toggle navigation" id="navToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul id="navMenu">
                <li><a href="index.html">หน้าหลัก</a></li>
                <li><a href="daily-log.html">ดูบันทึก</a></li>
                <li><a href="upload.html">อัปโหลดงาน</a></li>
                <li><a href="attendance.html" class="active">ลงเวลาทำงาน</a></li>
                <li><a href="profile.html">ข้อมูลส่วนตัว</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div style="max-width:800px; margin:40px auto;">
            <section class="glass-card fade-in" style="text-align:center; margin-bottom:20px;">
                <h2 id="liveClock" style="font-size: 3rem; color: var(--primary);">00:00:00</h2>
                <p id="currentDateDisplay" style="font-size: 1.2rem; color: var(--text-light);">...</p>
                <div style="margin-top:25px; display:flex; gap:15px; justify-content:center;">
                    <button id="btnIn" onclick="saveTime('IN')" class="btn btn-primary">Check In</button>
                    <button id="btnOut" onclick="saveTime('OUT')" class="btn btn-outline">Check Out</button>
                </div>
            </section>

            <div class="glass-card">
                <h3>ประวัติการลงเวลา</h3>
                <table class="attendance-table">
                    <thead>
                        <tr>
                            <th>วันที่</th>
                            <th>เข้า</th>
                            <th>ออก</th>
                            <th>สถานะ</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Firebase + แอป -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>

    <!-- Navbar toggle บนมือถือ -->
    <script>
        const navToggle = document.getElementById('navToggle');
        const navMenu = document.getElementById('navMenu');
        if (navToggle && navMenu) {
            navToggle.addEventListener('click', () => {
                navMenu.classList.toggle('open');
            });
        }
    </script>
</body>
</html>
