<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><title>Attendance | InternPro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="container nav-flex">
            <a href="index.html" class="logo">INTERN<span>PRO</span></a>
            <ul>
                <li><a href="index.html">หน้าหลัก</a></li>
                <li><a href="daily-log.html">ดูบันทึก</a></li>
                <li><a href="upload.html">อัปโหลดงาน</a></li>
                <li><a href="attendance.html">ลงเวลาทำงาน</a></li>
                <li><a href="profile.html">ข้อมูลส่วนตัว</a></li>
            </ul>
        </div>
    </nav>
    <main class="container">
        <div style="max-width:800px; margin:40px auto;">
            <section class="glass-card fade-in" style="text-align:center;">
                <h2 id="liveClock" style="font-size:3rem; color:var(--primary);">00:00:00</h2>
                <p id="currentDateDisplay">กำลังโหลด...</p>
                <div style="margin-top:25px; display:flex; gap:15px; justify-content:center;">
                    <button onclick="saveTime('IN')" class="btn btn-primary">Check In</button>
                    <button onclick="saveTime('OUT')" class="btn btn-outline">Check Out</button>
                </div>
            </section>
            <section class="glass-card">
                <h3>ประวัติการลงเวลา</h3>
                <div style="overflow-x:auto;">
                    <table class="attendance-table" style="width:100%; border-collapse:collapse; margin-top:15px;">
                        <thead>
                            <tr style="border-bottom:2px solid #eee;">
                                <th style="padding:10px;">วันที่</th><th>เข้า</th><th>ออก</th><th>สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceBody" style="text-align:center;"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
