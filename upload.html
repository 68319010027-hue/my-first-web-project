<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อัปโหลดงาน | InternPro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav aria-label="เมนูหลัก">
        <div class="container nav-flex">
            <a href="index.html" class="logo">INTERN<span>PRO</span></a>
            <button type="button" class="nav-toggle" id="navToggle" aria-label="เปิดเมนู" aria-expanded="false" aria-controls="navMenu">
                <span></span><span></span><span></span>
            </button>
            <ul id="navMenu">
                <li><a href="index.html">หน้าหลัก</a></li>
                <li><a href="dashboard.html">แดชบอร์ด</a></li>
                <li><a href="daily-log.html">ดูบันทึก</a></li>
                <li><a href="upload.html" class="active">อัปโหลดงาน</a></li>
                <li><a href="attendance.html">ลงเวลาทำงาน</a></li>
                <li><a href="profile.html">ข้อมูลส่วนตัว</a></li>
            </ul>
        </div>
    </nav>
    <div class="nav-overlay" id="navOverlay" aria-hidden="true"></div>

    <main class="container">
        <div class="glass-card fade-in" style="max-width:600px; margin:40px auto;">
            <h2>บันทึกกิจกรรมรายวัน</h2>
            <form id="addLogForm">
                <label>วันที่</label>
                <input type="date" id="logDate" class="input-field" required>

                <label>รายละเอียดงาน</label>
                <textarea id="logActivity" rows="5" class="input-field" placeholder="วันนี้ทำอะไรบ้าง..." required></textarea>

                <label>รูปภาพประกอบ (ถ้ามี)</label>
                <input type="file" id="logImage" accept="image/*" class="input-field">

                <button type="submit" class="btn btn-primary" style="width:100%;">เพิ่มบันทึกลงในระบบ</button>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p class="footer-org">สำนักงานสาธารณสุขจังหวัดเลย</p>
            <p class="footer-meta">ระบบจัดการและบันทึกการฝึกงาน — InternPro</p>
            <p class="footer-year">© 2025–2026</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
