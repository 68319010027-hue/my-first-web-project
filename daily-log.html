<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ดูบันทึก | InternPro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="container nav-flex">
            <a href="index.html" class="logo">INTERN<span>PRO</span></a>
            <ul id="navMenu">
                <li><a href="index.html">หน้าหลัก</a></li>
                <li><a href="daily-log.html" class="active">ดูบันทึก</a></li>
                <li><a href="upload.html">อัปโหลดงาน</a></li>
                <li><a href="attendance.html">ลงเวลาทำงาน</a></li>
                <li><a href="profile.html">ข้อมูลส่วนตัว</a></li>
            </ul>
        </div>
    </nav>

    <main class="container log-page-grid">
        <aside class="log-sidebar">
            <div class="glass-card">
                <h3>📅 เลือกสัปดาห์</h3>
                <div id="weekNavigation" class="week-nav-container"></div>
                <hr style="margin:20px 0; opacity:0.1;">
                <button onclick="exportData()" class="btn btn-outline" style="width:100%; font-size:0.8rem; margin-bottom:10px;">💾 โหลดไฟล์ JSON</button>
                <label for="importFile" class="btn btn-primary" style="width:100%; font-size:0.8rem; cursor:pointer; display:block; text-align:center;">📂 นำเข้าไฟล์ JSON</label>
                <input type="file" id="importFile" style="display:none;" accept=".json" onchange="importData(event)">
            </div>
        </aside>
        <section class="log-content">
            <div id="logDisplayArea"></div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
